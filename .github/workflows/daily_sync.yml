name: Daily Forex Data Sync

on:
  schedule:
    - cron: '0 6 * * *' # Automatically runs every day at 6:00 AM UTC
  workflow_dispatch: # Gives you a manual trigger button in the GitHub Actions UI

permissions:
  contents: write # Important: Allows the cloud runner to save data back to your repo

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Data Pipeline Ingestion
        run: |
          python src/ingestion.py

      - name: Commit and Push Changes back to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/compliance_os.db || git add compliance_os.db || true
          git commit -m "Automated daily Forex & Wise data sync [skip ci]" || exit 0
          git push