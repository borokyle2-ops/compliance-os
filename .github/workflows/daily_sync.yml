name: ComplianceOS 6-Hour Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs automatically every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:       # Keeps your manual run button active in GitHub

permissions:
  contents: write          # Explicitly allows the runner to overwrite files in repo

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create data directory if missing
        run: mkdir -p data

      - name: Verify corridor_data.xlsx is present
        run: |
          if [ ! -f "corridor_data.xlsx" ]; then
            echo "corridor_data.xlsx not found — downloading from World Bank..."
            curl -L "https://remittanceprices.worldbank.org/sites/default/files/rpw_dataset_2011_2025_q1.xlsx" \
              -o corridor_data.xlsx
          else
            echo "corridor_data.xlsx found — using existing file."
          fi

      - name: Run Full Pipeline (Ingestion + Forex + Wise)
        run: python pipeline.py

      - name: Commit Updated Database Back to GitHub
        run: |
          git config --global user.name "ComplianceOS Data Bot"
          git config --global user.email "actions@github.com"
          git add data/compliance_os.db
          
          # Commit only if database file actually changed
          git diff --staged --quiet && echo "No data changes to commit." || \
            git commit -m "data: automated 6-hour sync $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          
          # Force push ensures the bot updates the data file regardless of local code pushes
          git push origin main --force