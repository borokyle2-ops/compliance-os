name: Daily Forex Data Sync

on:
  schedule:
    - cron: '0 6 * * *' # Automatically runs every day at 6:00 AM UTC
  workflow_dispatch: # Gives you a manual trigger button in the dashboard

permissions:
  contents: write # Important: Allows the cloud runner to save data back to your repo

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Forex Ingestion Pipeline
        env:
          EXCHANGE_RATE_API: ${{ secrets.EXCHANGE_RATE_API }}
        run: python src/sources/forex_source.py

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated database file
          git add data/compliance_os.db || true
          
          # Only commit if changes are detected to prevent execution stalls
          git diff-index --quiet HEAD || git commit -m "chore: automated daily forex database refresh [skip ci]"
          git push
